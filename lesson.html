<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">درس HSK1 — تعلّم الصيني</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#17140F; --ink-2:#211C15; --paper:#F1E8D6;
    --seal:#B23A2E; --seal-dark:#8C2C22; --gold:#C9A24B; --jade:#3F6259;
    --text-soft:#D8CDB6; --text-dim:#8A8272;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--ink); color:var(--paper); font-family:'Tajawal',sans-serif; line-height:1.75; }
  h1,h2{ font-family:'Amiri',serif; }
  .zh{ font-family:'Noto Serif SC',serif; }
  .wrap{ max-width:920px; margin:0 auto; padding:0 24px; }

  header.top{
    position:sticky; top:0; z-index:20; background:rgba(23,20,15,0.92); backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(201,162,75,0.18); padding:16px 0;
  }
  header.top .wrap{ display:flex; align-items:center; justify-content:space-between; }
  .brand{ font-family:'Amiri',serif; font-size:1.15rem; }
  .back-link{ font-size:0.9rem; color:var(--text-soft); text-decoration:none; }
  .back-link:hover{ color:var(--gold); }

  .hero{ padding:50px 0 30px; }
  .eyebrow{ color:var(--gold); font-size:0.85rem; margin-bottom:10px; }
  h1{ font-size:1.9rem; margin-bottom:12px; }
  .hero p{ color:var(--text-soft); max-width:640px; }
  .progress{ margin-top:20px; height:4px; background:var(--ink-2); border-radius:2px; overflow:hidden; }
  .progress-bar{ height:100%; background:var(--seal); transition:width .3s; }
  .progress-label{ font-size:0.78rem; color:var(--text-dim); margin-top:8px; }

  section{ padding:20px 0 56px; }

  .vocab-list{ display:flex; flex-direction:column; gap:1px; background:rgba(201,162,75,0.15); border:1px solid rgba(201,162,75,0.15); border-radius:4px; overflow:hidden; }
  .vocab-item{
    background:var(--ink-2); padding:22px 24px; display:grid;
    grid-template-columns:90px 110px 1fr 44px; align-items:center; gap:18px;
  }
  .v-char{ font-family:'Noto Serif SC',serif; font-size:2rem; color:var(--paper); }
  .v-pinyin{ color:var(--gold); font-size:1.05rem; }
  .v-ar{ font-weight:700; color:var(--paper); margin-bottom:4px; }
  .v-example{ font-size:0.85rem; color:var(--text-dim); }
  .v-example .zh{ color:var(--jade); }
  .sound-btn{
    width:40px; height:40px; border-radius:50%; border:1px solid rgba(201,162,75,0.4);
    background:none; color:var(--gold); cursor:pointer; font-size:0.95rem;
  }
  .sound-btn:hover{ background:var(--gold); color:var(--ink); }

  .nav-buttons{ display:flex; justify-content:space-between; gap:16px; margin-top:40px; }
  .nav-btn{
    flex:1; text-align:center; padding:16px; border-radius:4px; text-decoration:none;
    font-weight:700; font-family:'Tajawal',sans-serif; transition:opacity .2s;
  }
  .nav-btn.prev{ background:var(--ink-2); color:var(--text-soft); border:1px solid rgba(201,162,75,0.2); }
  .nav-btn.next{ background:var(--seal); color:var(--paper); }
  .nav-btn.disabled{ opacity:0.35; pointer-events:none; }
  .nav-btn:hover{ opacity:0.85; }

  .review-box{
    margin-top:24px; background:var(--ink-2); border:1px solid rgba(201,162,75,0.2);
    border-radius:6px; padding:24px; text-align:center;
  }
  .review-box p{ color:var(--text-soft); }
  .review-box a{ color:var(--gold); }

  footer{ padding:40px 0; text-align:center; color:var(--text-dim); font-size:0.85rem; }

  @media (max-width:640px){
    .vocab-item{ grid-template-columns:56px 1fr 40px; grid-template-areas:"char pinyin sound" "char mean mean"; }
    .v-char{ grid-area:char; } .v-pinyin{ grid-area:pinyin; } .v-example, .v-ar{ grid-area:mean; } .sound-btn{ grid-area:sound; }
  }
</style>
</head>
<body>

<header class="top">
  <div class="wrap">
    <div class="brand">تعلّم <span class="zh" style="color:var(--seal)">中文</span></div>
    <a class="back-link" href="hsk1.html">→ رجوع لدروس HSK1</a>
  </div>
</header>

<section class="hero">
  <div class="wrap">
    <div class="eyebrow" id="eyebrow">HSK1</div>
    <h1 id="lessonTitle">جاري التحميل...</h1>
    <p id="lessonDesc"></p>
    <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel"></div>
  </div>
</section>

<section>
  <div class="wrap">
    <div class="vocab-list" id="vocabList"></div>

    <div class="nav-buttons">
      <a class="nav-btn prev" id="prevBtn" href="#">← الدرس السابق</a>
      <a class="nav-btn next" id="nextBtn" href="#">الدرس التالي ←</a>
    </div>

    <div class="review-box">
      <p>خلصت الدرس؟ <a href="hsk1.html">رجوع لخريطة كل الدروس</a></p>
    </div>
  </div>
</section>

<footer id="pageFooter">تعلّم 中文</footer>

<script src="hsk1-data.js"></script>
<script>
  /* ---- read lesson number from URL: lesson.html?l=3 ---- */
  const params = new URLSearchParams(window.location.search);
  const lessonId = parseInt(params.get('l') || '1', 10);
  const lesson = HSK1_LESSONS.find(l => l.id === lessonId);
  const total = HSK1_LESSONS.length;

  if (!lesson) {
    document.getElementById('lessonTitle').textContent = 'الدرس مش موجود';
  } else {
    document.title = `الدرس ${lesson.id}: ${lesson.title} — HSK1 — تعلّم الصيني`;
    document.getElementById('eyebrow').textContent = `HSK1 — الدرس ${lesson.id} من ${total}`;
    document.getElementById('lessonTitle').textContent = lesson.title;
    document.getElementById('lessonDesc').textContent = `${lesson.words.length} كلمة أساسية في الدرس ده.`;
    document.getElementById('progressBar').style.width = `${(lesson.id/total)*100}%`;
    document.getElementById('progressLabel').textContent = `الدرس ${lesson.id} من ${total} — مستوى HSK1`;
    document.getElementById('pageFooter').textContent = `تعلّم 中文 — الدرس ${lesson.id} من ${total} — مستوى HSK1`;

    const list = document.getElementById('vocabList');
    lesson.words.forEach(w => {
      const item = document.createElement('div');
      item.className = 'vocab-item';
      item.innerHTML = `
        <div class="v-char zh">${w.char}</div>
        <div class="v-pinyin">${w.pinyin}</div>
        <div>
          <div class="v-ar">${w.ar}</div>
          <div class="v-example"><span class="zh">${w.ex_zh}</span> (${w.ex_py}) = ${w.ex_ar}</div>
        </div>
        <button class="sound-btn" data-char="${w.char.split(' / ')[0]}">🔊</button>
      `;
      list.appendChild(item);
    });
    list.querySelectorAll('.sound-btn').forEach(btn=>{
      btn.addEventListener('click', ()=> speakChinese(btn.dataset.char));
    });

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    if (lesson.id > 1){ prevBtn.href = `lesson.html?l=${lesson.id-1}`; }
    else { prevBtn.classList.add('disabled'); }
    if (lesson.id < total){ nextBtn.href = `lesson.html?l=${lesson.id+1}`; }
    else { nextBtn.textContent = 'خلصت المستوى! 🎉'; nextBtn.href = 'hsk1.html'; }
  }

  /* ---- shared TTS with graceful voice detection ---- */
  let zhVoice = null;
  let voicesReady = false;

  function loadZhVoice(){
    if (!('speechSynthesis' in window)) return;
    const voices = window.speechSynthesis.getVoices();
    if (voices.length){
      zhVoice = voices.find(v => v.lang === 'zh-CN')
             || voices.find(v => v.lang && v.lang.startsWith('zh'))
             || null;
      voicesReady = true;
    }
  }
  if ('speechSynthesis' in window){
    loadZhVoice();
    window.speechSynthesis.onvoiceschanged = loadZhVoice;
  }

  function speakChinese(text){
    if (window.AppInventor && typeof window.AppInventor.setWebViewString === 'function'){
      window.AppInventor.setWebViewString('SPEAK_ZH::' + text);
      return;
    }
    if (!('speechSynthesis' in window)){
      alert('المتصفح ده مش بيدعم النطق الصوتي (Web Speech API).');
      return;
    }
    if (!voicesReady){
      loadZhVoice();
      if (!voicesReady){
        setTimeout(() => speakChinese(text), 300);
        return;
      }
    }
    if (!zhVoice){
      alert('مفيش صوت صيني (zh-CN) متثبت على الجهاز/المتصفح ده. على أندرويد: Settings → General management → Text-to-speech → ثبّت بيانات صوت الصينية.');
      return;
    }
    const utter = new SpeechSynthesisUtterance(text);
    utter.voice = zhVoice;
    utter.lang = 'zh-CN';
    utter.rate = 0.8;
    utter.onerror = (e) => console.error('TTS error:', e.error);
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utter);
  }
</script>

</body>
</html>
