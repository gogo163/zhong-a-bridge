<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تعلّم الكتابة - Taallim Chinese</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.7/dist/hanzi-writer.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;800&family=Noto+Serif+SC:wght@400;700&display=swap');

  :root{
    --ink: #1c1a17;
    --paper: #f3ede1;
    --paper-deep: #e8dfcd;
    --seal: #a6362c;
    --gold: #b8863b;
    --gold-soft: #d9b774;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 10%, rgba(184,134,59,0.07), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(166,54,44,0.06), transparent 40%),
      var(--paper);
    color:var(--ink);
    font-family:'Noto Sans Arabic', sans-serif;
    min-height:100vh;
    padding:24px 16px 60px;
  }

  header{
    text-align:center;
    margin-bottom:28px;
  }

  .eyebrow{
    font-size:13px;
    letter-spacing:2px;
    color:var(--seal);
    font-weight:800;
    margin-bottom:6px;
  }

  h1{
    font-size:26px;
    margin:0;
    font-weight:800;
  }

  .sub{
    color:#6b6255;
    font-size:14px;
    margin-top:6px;
  }

  .card{
    max-width:420px;
    margin:0 auto 20px;
    background:var(--paper-deep);
    border:1px solid rgba(28,26,23,0.08);
    border-radius:18px;
    padding:20px;
    box-shadow:0 10px 30px rgba(28,26,23,0.06);
    position:relative;
  }

  .seal-mark{
    position:absolute;
    top:14px;
    left:14px;
    width:34px;
    height:34px;
    border-radius:6px;
    background:var(--seal);
    color:#f3ede1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Noto Serif SC', serif;
    font-size:16px;
    font-weight:700;
    box-shadow:0 2px 6px rgba(166,54,44,0.35);
  }

  .char-header{
    text-align:center;
    margin-bottom:14px;
  }

  .pinyin{
    font-size:15px;
    color:var(--seal);
    font-weight:700;
    letter-spacing:1px;
  }

  .meaning{
    font-size:15px;
    color:var(--ink);
    margin-top:2px;
  }

  #writer-target, #writer-quiz{
    background:var(--paper);
    border:2px dashed var(--gold-soft);
    border-radius:14px;
    display:block;
    margin:14px auto;
  }

  .btn-row{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
  }

  button{
    font-family:inherit;
    font-weight:700;
    font-size:14px;
    border:none;
    border-radius:999px;
    padding:10px 18px;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
  }

  button:active{ transform:scale(0.96); }

  .btn-primary{
    background:var(--seal);
    color:#f3ede1;
    box-shadow:0 6px 16px rgba(166,54,44,0.3);
  }

  .btn-gold{
    background:var(--gold);
    color:#fff;
    box-shadow:0 6px 16px rgba(184,134,59,0.3);
  }

  .btn-ghost{
    background:transparent;
    color:var(--ink);
    border:1.5px solid rgba(28,26,23,0.2);
  }

  .status{
    text-align:center;
    min-height:22px;
    font-size:14px;
    font-weight:700;
    margin-top:12px;
    color:var(--gold);
  }

  .status.success{ color:#3f7d4f; }

  .stroke-picker{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-top:10px;
    flex-wrap:wrap;
  }

  .stroke-picker button{
    background:var(--paper);
    color:var(--ink);
    border:1.5px solid var(--gold-soft);
    font-family:'Noto Serif SC', serif;
    font-size:20px;
    width:44px;
    height:44px;
    padding:0;
    border-radius:10px;
  }

  .stroke-picker button.active{
    background:var(--seal);
    color:#f3ede1;
    border-color:var(--seal);
  }

  footer{
    text-align:center;
    font-size:12px;
    color:#948b7c;
    margin-top:30px;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">书法 · تدريب الكتابة</div>
  <h1>اكتب الحرف بالترتيب الصحيح</h1>
  <div class="sub">هذا نموذج تجريبي يوضح آلية عمل HanziWriter داخل تطبيقك</div>
</header>

<!-- اختيار الحرف -->
<div class="card">
  <div class="stroke-picker" id="char-picker"></div>
</div>

<!-- عرض ترتيب الكتابة (Animation) -->
<div class="card">
  <div class="seal-mark">示</div>
  <div class="char-header">
    <div class="pinyin" id="demo-pinyin">nǐ</div>
    <div class="meaning" id="demo-meaning">أنتَ</div>
  </div>
  <div id="writer-target"></div>
  <div class="btn-row">
    <button class="btn-gold" id="btn-animate">▶ اعرض الترتيب</button>
  </div>
</div>

<!-- وضع الاختبار: المستخدم يكتب بنفسه -->
<div class="card">
  <div class="seal-mark">写</div>
  <div class="char-header">
    <div class="pinyin">دورك الآن</div>
    <div class="meaning">ارسم الحرف بإصبعك بنفس ترتيب الخطوط</div>
  </div>
  <div id="writer-quiz"></div>
  <div class="btn-row">
    <button class="btn-primary" id="btn-quiz-start">ابدأ الاختبار</button>
    <button class="btn-ghost" id="btn-quiz-reset">إعادة</button>
  </div>
  <div class="status" id="quiz-status"></div>
</div>

<footer>Taallim Chinese · نموذج تجريبي بمكتبة HanziWriter (مجانية ومفتوحة المصدر)</footer>

<script>
const characters = [
  { char: "你", pinyin: "nǐ", meaning: "أنتَ" },
  { char: "好", pinyin: "hǎo", meaning: "جيد / خير" },
  { char: "学", pinyin: "xué", meaning: "يتعلّم" },
  { char: "了", pinyin: "le", meaning: "أداة اكتمال الفعل" }
];

let currentChar = characters[0];
let demoWriter, quizWriter;

// -------- بناء أزرار اختيار الحرف --------
const picker = document.getElementById('char-picker');
characters.forEach((c, i) => {
  const btn = document.createElement('button');
  btn.textContent = c.char;
  if (i === 0) btn.classList.add('active');
  btn.onclick = () => {
    document.querySelectorAll('.stroke-picker button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadCharacter(c);
  };
  picker.appendChild(btn);
});

function loadCharacter(c) {
  currentChar = c;
  document.getElementById('demo-pinyin').textContent = c.pinyin;
  document.getElementById('demo-meaning').textContent = c.meaning;

  document.getElementById('writer-target').innerHTML = '';
  document.getElementById('writer-quiz').innerHTML = '';
  document.getElementById('quiz-status').textContent = '';
  document.getElementById('quiz-status').className = 'status';

  demoWriter = HanziWriter.create('writer-target', c.char, {
    width: 260,
    height: 260,
    padding: 12,
    strokeColor: '#1c1a17',
    radicalColor: '#a6362c',
    outlineColor: '#d9b774',
    showOutline: true,
    strokeAnimationSpeed: 1,
    delayBetweenStrokes: 250
  });

  quizWriter = HanziWriter.create('writer-quiz', c.char, {
    width: 260,
    height: 260,
    padding: 12,
    strokeColor: '#1c1a17',
    outlineColor: '#d9b774',
    showOutline: true,
    showCharacter: false,
    highlightOnComplete: true
  });
}

document.getElementById('btn-animate').onclick = () => {
  demoWriter.animateCharacter();
};

document.getElementById('btn-quiz-start').onclick = () => {
  const statusEl = document.getElementById('quiz-status');
  statusEl.textContent = 'ارسمي الآن...';
  statusEl.className = 'status';

  quizWriter.quiz({
    onMistake: function(strokeData) {
      statusEl.textContent = `خطأ في الخط رقم ${strokeData.strokeNum + 1}، حاولي تاني`;
      statusEl.className = 'status';
    },
    onCorrectStroke: function(strokeData) {
      statusEl.textContent = `صح! باقي ${strokeData.strokesRemaining} خط`;
      statusEl.className = 'status success';
    },
    onComplete: function(summaryData) {
      statusEl.textContent = `أحسنت! أكملتِ الحرف (${summaryData.totalMistakes} أخطاء)`;
      statusEl.className = 'status success';
    }
  });
};

document.getElementById('btn-quiz-reset').onclick = () => {
  loadCharacter(currentChar);
};

// تحميل أول حرف عند فتح الصفحة
loadCharacter(characters[0]);
</script>

</body>
</html>
